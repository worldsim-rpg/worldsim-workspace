[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "worldsim-schemas"
version = "0.1.0"
description = "Shared pydantic schemas for worldsim canon."
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.6.0",
]

[tool.setuptools.packages.find]
where = ["src"]
