name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-schemas:
    name: schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install schemas
        working-directory: packages/schemas
        run: pip install -e ".[test]" 2>/dev/null || pip install -e . pytest

      - name: Test schemas
        working-directory: packages/schemas
        run: python -m pytest tests/ -q --tb=short

  test-prompts:
    name: prompts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install prompts with dev deps
        working-directory: packages/prompts
        run: pip install -e ".[dev]"

      - name: Test prompts
        working-directory: packages/prompts
        run: python -m pytest tests/ -q --tb=short

  sync-integrity:
    name: sync-integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install schemas
        working-directory: packages/schemas
        run: pip install -e .

      - name: Verify schemas import
        run: python -c "import worldsim_schemas; print('schemas ok:', list(worldsim_schemas.__all__)[:3])"
